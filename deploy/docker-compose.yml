# 단일 EC2 운영 — 앱 + Caddy(자동 HTTPS). ALB/NAT/RDS/ECS/CloudFront 미사용.
# 사용:  cd deploy && docker compose up -d --build
# .env (이 디렉터리)에서 DOMAIN·시크릿을 읽는다(깃·이미지에 굽지 않음).

services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: sim-investment:latest   # batch 사이드카가 재사용(중복 빌드 방지)
    restart: unless-stopped
    env_file: .env            # FRED/FMP/ANTHROPIC/GEMINI/TELEGRAM/TOSS 키
    environment:
      - HOME=/data
    volumes:
      - ./state:/data         # ~/.siminvest_accounts.json, alerts.json, auth 등(영속)
      - ./appdata:/app/data    # market_data.db 등(영속)
    expose:
      - "8520"                # 외부 비공개 — Caddy만 접근

  # 데이터 배치 작성기 — 매일 KST 06시 main.py 실행해 market_data.db 갱신.
  # app 과 동일 이미지·볼륨·.env 공유(같은 DB 파일에 씀). Caddy 미노출.
  batch:
    image: sim-investment:latest   # app 이 빌드한 이미지 재사용
    restart: unless-stopped
    env_file: .env
    environment:
      - HOME=/data
      - BATCH_HOUR=6                # KST 실행 시각(미국 장마감 후)
    volumes:
      - ./state:/data
      - ./appdata:/app/data        # app 과 동일 market_data.db 영속 볼륨
    command: ["python", "deploy/batch_scheduler.py"]
    depends_on:
      - app                        # app 빌드 후 그 이미지 재사용

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}       # .env 의 DOMAIN — Caddyfile 의 {$DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # 발급된 인증서(영속 — 재발급 rate limit 회피)
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
