# 단일 EC2 운영 — 앱 + Caddy(자동 HTTPS). ALB/NAT/RDS/ECS/CloudFront 미사용.
# 이미지는 GitHub Actions(.github/workflows/build.yml)가 GHCR에 빌드·푸시한다(linux/amd64).
# EC2 는 빌드하지 않고 받아서 띄운다:  cd deploy && docker compose pull && docker compose up -d
# .env (이 디렉터리)에서 DOMAIN·시크릿·IMAGE_TAG 를 읽는다(깃·이미지에 굽지 않음).

services:
  app:
    # CI가 푸시한 GHCR 이미지. 롤백 시 .env 에 IMAGE_TAG=sha-xxxx 지정(기본 latest).
    image: ghcr.io/minqsimdev/sim-investment:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    env_file: .env            # FRED/FMP/ANTHROPIC/GEMINI/TELEGRAM/TOSS/USE_TOSS 키
    environment:
      - HOME=/data
    volumes:
      - ./state:/data         # ~/.siminvest_accounts.json, alerts.json, auth 등(영속)
      - ./appdata:/app/data    # market_data.db 등(영속)
    expose:
      - "8520"                # 외부 비공개 — Caddy만 접근

  # 데이터 배치 작성기 — 매일 KST 06시 main.py 실행해 market_data.db 갱신.
  # app 과 동일 이미지·볼륨·.env 공유(같은 DB 파일에 씀). Caddy 미노출.
  batch:
    image: ghcr.io/minqsimdev/sim-investment:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: unless-stopped
    env_file: .env
    environment:
      - HOME=/data
      - BATCH_HOUR=6                # KST 실행 시각(미국 장마감 후)
    volumes:
      - ./state:/data
      - ./appdata:/app/data        # app 과 동일 market_data.db 영속 볼륨
    command: ["python", "deploy/batch_scheduler.py"]
    depends_on:
      - app

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}       # .env 의 DOMAIN — Caddyfile 의 {$DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # 발급된 인증서(영속 — 재발급 rate limit 회피)
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
